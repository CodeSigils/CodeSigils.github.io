backend:
  name: github
  repo: CodeSigils/CodeSigils.github.io
  branch: master

site_url: https://codesigils.github.io/

media_folder: docs/assets/images
public_folder: /assets/images

media_library:
  name: assets
  config:
    image:
      choose_url: true

collections:
  - name: pages
    label: Pages
    label_singular: Page
    folder: docs
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - {label: Title, name: title, widget: string, required: false}
      - {
          label: Description,
          name: description,
          widget: text,
          required: false,
          hint: Short summary for SEO and previews,
        }
      - {
          label: Keywords,
          name: keywords,
          widget: list,
          required: false,
          hint: Comma-separated keywords for SEO,
        }
      - {
          label: Icon,
          name: icon,
          widget: string,
          required: false,
          hint: e.g. lucide/rocket,
        }
      - {label: Body, name: body, widget: markdown}

  - name: jsts
    label: JS-TS Section
    folder: docs/JS-TS
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - {label: Title, name: title, widget: string}
      - {
          label: Description,
          name: description,
          widget: text,
          required: false,
          hint: Short summary for SEO,
        }
      - {
          label: Keywords,
          name: keywords,
          widget: list,
          required: false,
          hint: Comma-separated keywords for SEO,
        }
      - {label: Icon, name: icon, widget: string, required: false}
      - {label: Body, name: body, widget: markdown}

  - name: ai
    label: AI Section
    folder: docs/AI
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - {label: Title, name: title, widget: string}
      - {
          label: Description,
          name: description,
          widget: text,
          required: false,
          hint: Short summary for SEO,
        }
      - {
          label: Keywords,
          name: keywords,
          widget: list,
          required: false,
          hint: Comma-separated keywords for SEO,
        }
      - {label: Icon, name: icon, widget: string, required: false}
      - {label: Body, name: body, widget: markdown}

  - name: ai_opencode
    label: OpenCode
    folder: docs/AI/OpenCode
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - {label: Title, name: title, widget: string, required: true}
      - {label: Description, name: description, widget: text, required: false, hint: "Meta description (150 chars) for SEO"}
      - {label: Keywords, name: keywords, widget: list, required: false, hint: "opencode, AI coding agent, terminal, LLM"}
      - {label: Icon, name: icon, widget: string, required: false, hint: "lucide/terminal"}
      - {label: Body, name: body, widget: markdown}

  - name: ai_hermes
    label: Hermes
    folder: docs/AI/Hermes
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - {label: Title, name: title, widget: string, required: true}
      - {label: Description, name: description, widget: text, required: false, hint: "Meta description (150 chars) for SEO"}
      - {label: Keywords, name: keywords, widget: list, required: false, hint: "hermes AI, Nous Research, AI agent"}
      - {label: Icon, name: icon, widget: string, required: false, hint: "lucide/bot"}
      - {label: Body, name: body, widget: markdown}

  - name: ai_llms
    label: LLMs
    folder: docs/AI/LLMs
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - {label: Title, name: title, widget: string, required: true}
      - {label: Description, name: description, widget: text, required: false, hint: "Meta description (150 chars) for SEO"}
      - {label: Keywords, name: keywords, widget: list, required: false, hint: "LLM, open source, local AI, Ollama"}
      - {label: Icon, name: icon, widget: string, required: false, hint: "lucide/cpu"}
      - {label: Body, name: body, widget: markdown}
